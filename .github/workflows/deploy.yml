name: Task8 CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t pragnesh92/soc-alert-api:${{ github.run_number }} ./app/backend

      - name: Push Backend Image
        run: docker push pragnesh92/soc-alert-api:${{ github.run_number }}

      - name: Build Frontend Image
        run: docker build -t pragnesh92/soc-alert-frontend:${{ github.run_number }} ./app/frontend

      - name: Push Frontend Image
        run: docker push pragnesh92/soc-alert-frontend:${{ github.run_number }}