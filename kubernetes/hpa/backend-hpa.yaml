apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: soc-api-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: soc-api

  minReplicas: 3
  maxReplicas: 5

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70